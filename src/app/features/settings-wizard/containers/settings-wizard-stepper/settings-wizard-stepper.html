<app-wrapper-card>
  <app-custom-stepper (finalizeEmit)="finalizeStep.set($event)">
    <cdk-step>
      <app-theme-selection (optionEmit)="themeOption.set($event)" />
    </cdk-step>

    <cdk-step>
      <app-font-size (fontSizeEmit)="fontSizeOption.set($event)" />
    </cdk-step>
  </app-custom-stepper>
</app-wrapper-card>

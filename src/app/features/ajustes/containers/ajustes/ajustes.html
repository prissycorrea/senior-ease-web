<div class="d-flex flex-column align-items-start w-100 h-100">
  <h1 class="my-4 ms-3">Ajuste</h1>

  <div class="row w-100">
    <div class="col-md-5">
      <p class="text-muted mb-3">&nbsp;</p>
      <div class="card-dashboard" routerLink="perfil">
        <div class="card-dashboard__icon">
          <i class="fa-solid fa-user"></i>
        </div>
        <div class="card-dashboard__content">
          <h5>{{ profile()!.name }}</h5>
          <p class="mb-0">{{ profile()!.email }}</p>
        </div>
      </div>
      <p class="text-muted my-3">CONTA</p>
      <div class="card-dashboard">
        <div class="card-dashboard__icon">
          <i class="fa-solid fa-lock"></i>
        </div>
        <div class="card-dashboard__content">
          <h5>Privacidade e Segurança</h5>
        </div>
        <div class="card-dashboard__actions">
          <i class="fa-solid fa-angle-right"></i>
        </div>
      </div>
    </div>
    <div class="col-md-5 offset-md-2">
      <p class="text-muted mb-3">ACESSIBILIDADE</p>
      <div class="card-dashboard" routerLink="letras" routerLinkActive="router-link-active">
        <div class="card-dashboard__icon">
          <i class="fa-solid fa-font"></i>
        </div>
        <div class="card-dashboard__content">
          <h5>Ajustar tamanho da letra</h5>
        </div>
        <div class="card-dashboard__actions">
          <i class="fa-solid fa-angle-right"></i>
        </div>
      </div>

      <div class="card-dashboard my-3" routerLink="cores" routerLinkActive="router-link-active">
        <div class="card-dashboard__icon">
          <i class="fa-solid fa-circle-half-stroke"></i>
        </div>
        <div class="card-dashboard__content">
          <h5>Mudar Cores/Contrastes</h5>
        </div>
        <div class="card-dashboard__actions">
          <i class="fa-solid fa-angle-right"></i>
        </div>
      </div>
    </div>
  </div>
</div>

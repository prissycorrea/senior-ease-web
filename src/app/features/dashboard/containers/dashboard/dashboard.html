<div class="container">
  <app-dashboard-header [user]="user()" />

  <h2>Próximas atividades</h2>

  <div class="d-flex flex-wrap gap-3 my-5 w-100">
    @for (task of tasks(); track task.id) {
      <div class="card-dashboard" [class.card-dashboard--disabled]="task.completed">
        <div class="card-dashboard__icon">
          <i class="fa-solid fa-prescription-bottle-medical"></i>
        </div>
        <div class="card-dashboard__content">
          <h5>{{ task.task }}</h5>
          <p><i class="fa-regular fa-clock"></i>{{ task.period | date: 'HH:mm'}}</p>
        </div>
        <div class="card-dashboard__actions" (click)="markActivityAsCompleted(task)">
          <i class="fa-solid fa-angle-right"></i>
        </div>
      </div>
    }

  <app-progress-bar [value]="completedActivitiesInPercent()"></app-progress-bar>

  <div class="d-flex flex-wrap gap-5 my-5">

      <div class="card-dashboard__icon">
        <i class="fa-solid fa-prescription-bottle-medical"></i>
      </div>
      <div class="card-dashboard__content">
        <h5>{{ tasksPendents() }}</h5>
        <p>Atividades pendentes</p>
      </div>
    </div>

      <div class="card-dashboard__icon">

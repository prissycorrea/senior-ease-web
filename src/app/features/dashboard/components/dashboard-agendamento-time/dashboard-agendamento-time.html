<div class="p-5">
  <div class="text-center mb-5">
    <h1 class="text-xl font-bold">Horário da tarefa</h1>
  </div>

  <div class="d-flex gap-3 justify-content-center align-items-center mb-5">
    <div class="text-center w-100">
      <small class="text-muted d-block mb-1">Hora</small>
      <select
        [ngModel]="horaSelecionada()"
        (ngModelChange)="horaSelecionada.set($event)"
        class="form-select form-select-lg"
      >
        @for (hora of listaHoras; track hora) {
          <option [value]="hora">{{ hora }}</option>
        }
      </select>
    </div>

    <span class="fs-2 mt-3">:</span>

    <div class="text-center w-100">
      <small class="text-muted d-block mb-1">Minutos</small>
      <select
        [ngModel]="minutoSelecionado()"
        (ngModelChange)="minutoSelecionado.set($event)"
        class="form-select form-select-lg"
      >
        @for (min of listaMinutos; track min) {
          <option [value]="min">{{ min }}</option>
        }
      </select>
    </div>
  </div>

  <div class="alert alert-light text-center mb-4">
    Agendado para: <strong>{{ horarioFormatado() }}</strong>
  </div>

  <app-button class="w-100" label="Confirmar horário" (click)="salvarHorario()" />
</div>

<div class="text-center mb-5">
  <h1>Quando será esta atividade?</h1>
</div>

<div class="d-flex flex-column align-items-center gap-3">
  @if (hoje(); as item) {
    <div
      class="card-agendamento card-agendamento--col-6"
      [class.active]="dataSelecionada() === item.data"
      (click)="selecionar(item)"
    >
      <div class="card-agendamento__icon">
        <i class="fa-solid fa-calendar-days"></i>
      </div>
      <div class="card-agendamento__content">
        <h5>Hoje</h5>
      </div>
      <div class="card-agendamento__actions">
        <i
          [class]="
            dataSelecionada() === item.data ? 'fa-solid fa-circle-check' : 'fa-regular fa-circle'
          "
        ></i>
      </div>
    </div>
  }

  @if (amanha(); as item) {
    <div
      class="card-agendamento card-agendamento--col-6"
      [class.active]="dataSelecionada() === item.data"
      (click)="selecionar(item)"
    >
      <div class="card-agendamento__icon">
        <i class="fa-regular fa-clock"></i>
      </div>
      <div class="card-agendamento__content">
        <h5>Amanhã</h5>
      </div>
      <div class="card-agendamento__actions">
        <i
          [class]="
            dataSelecionada() === item.data ? 'fa-solid fa-circle-check' : 'fa-regular fa-circle'
          "
        ></i>
      </div>
    </div>
  }
</div>

<p class="text-muted my-5 text-uppercase text-center">Ou selecione um dia</p>

<div class="d-flex flex-wrap justify-content-center gap-3">
  @for (dia of proximosDias(); track dia.data.getTime()) {
    <div
      class="card-agendamento card-agendamento--col-4"
      [class.active]="dataSelecionada() === dia.data"
      (click)="selecionar(dia)"
    >
      <div class="card-agendamento__content card-agendamento--align-start">
        <h5>{{ dia.label }}</h5>
      </div>
      <div class="card-agendamento__actions">
        <i class="fa-solid fa-chevron-right"></i>
      </div>
    </div>
  }
</div>

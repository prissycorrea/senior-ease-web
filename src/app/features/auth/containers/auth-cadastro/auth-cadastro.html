<form [formGroup]="form">
  <app-custom-stepper [isLinear]="true" (finalizeEmit)="cadastrarUsuario()">
    <cdk-step [stepControl]="form.controls.step1">
      <div formGroupName="step1" class="w-100">
        <app-auth-input
          label="Como podemos te chamar?"
          inputLabel="Digite seu nome"
          type="text"
          class="w-100"
          formControlName="username"
        />
      </div>
    </cdk-step>

    <cdk-step [stepControl]="form.controls.step2">
      <div formGroupName="step2" class="w-100">
        <app-auth-input
          label="Qual seu e-mail?"
          inputLabel="Digite seu e-mail"
          type="email"
          class="w-100"
          formControlName="email"
        />
      </div>
    </cdk-step>

    <cdk-step [stepControl]="form.controls.step3">
      <div formGroupName="step3" class="w-100">
        <app-auth-input
          label="Crie uma senha segura?"
          inputLabel="Sua senha deve ser fácil de lembrar, mas difícil de adivinhar."
          type="password"
          class="w-100"
          formControlName="password"
        />
      </div>
    </cdk-step>
  </app-custom-stepper>
</form>

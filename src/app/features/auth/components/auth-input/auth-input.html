@if (label()) {
  <div class="text-center mb-5">
    <h1>{{ label() }}</h1>
  </div>
}

<div class="d-flex flex-column gap-3 mb-3">
  <label [for]="id()" class="form-label">{{ inputLabel() }}</label>
  <input
    [id]="id()"
    class="form-control"
    [type]="type()"
    [value]="value()"
    [placeholder]="placeholder()"
    [disabled]="isDisabled()"
    (input)="onInput($event)"
    (blur)="onTouched()"
  />
</div>

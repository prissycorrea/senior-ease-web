<button [attr.data-type]="type()" [disabled]="disabled() || loading()">
  <div class="d-flex align-items-center gap-2" [class.flex-column]="direction() ? 'column' : null">
    @if (loading()) {
      <div class="spinner-grow" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    } @else {
      <ng-content></ng-content>
    }
    {{ loading() ? labelLoading() : label() }}
  </div>
</button>
